name: Skill check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  skill-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deterministic skill checks
        run: npm run skill:check

      - name: Skills CLI smoke (list)
        run: npx --yes skills add . --list
        continue-on-error: true
